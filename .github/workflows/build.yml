name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v3

    - name: Download models from Google Drive
      run: |
        pip install gdown
        gdown 1C5xnHkKwhn_C3g3CTVb-7k545Fpt8rMl -O translate-es_en.argosmodel
        gdown 1QStO5fRN5VeqBWfNBnzDkPSqtrvrnHSu -O translate-en_es.argosmodel

    - name: Rename main file
      run: mv traductor.py main.py

    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = Traduce con Lucia
        package.name = traduceconlucia
        package.domain = org.adony
        source.dir = .
        source.include_exts = py,argosmodel,png
        source.include_patterns = *.argosmodel,*.png
        version = 1.0
        requirements = python3,kivy==2.2.1,argostranslate==1.9.6,ctranslate2==3.24.0,sentencepiece,sacremoses,stanza,packaging,numpy,pyyaml,setuptools
        icon.filename = icon-2.png
        orientation = portrait
        android.api = 33
        android.minapi = 24
        android.archs = arm64-v8a
        android.permissions = INTERNET,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE
        [buildozer]
        log_level = 2
        EOF

    - name: Build APK with Docker
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/home/user/hostcwd \
          --entrypoint /bin/bash \
          kivy/buildozer:latest \
          -c "cd /home/user/hostcwd && yes | buildozer android debug"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: traductor-apk
        path: bin/*.apk
