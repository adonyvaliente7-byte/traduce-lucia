name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          autoconf automake libtool build-essential \
          zip unzip openjdk-17-jdk python3-pip \
          libffi-dev libssl-dev
        pip install buildozer cython==0.29.33 gdown

    - name: Rename main file
      run: mv traductor.py main.py

    - name: Download models from Google Drive
      run: |
        gdown 1C5xnHkKwhn_C3g3CTVb-7k545Fpt8rMl -O translate-es_en.argosmodel
        gdown 1QStO5fRN5VeqBWfNBnzDkPSqtrvrnHSu -O translate-en_es.argosmodel

    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = Traduce con Lucia
        package.name = traduceconlucia
        package.domain = org.adony
        source.dir = .
        source.include_exts = py,argosmodel,png
        source.include_patterns = *.argosmodel,*.png
        version = 1.0
        requirements = python3,kivy,argostranslate
        icon.filename = icon-2.png
        orientation = portrait
        android.api = 33
        android.minapi = 24
        android.archs = arm64-v8a, armeabi-v7a
        android.permissions = INTERNET,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE
        [buildozer]
        log_level = 2
        EOF

    - name: Build APK
      run: yes | buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: traductor-apk
        path: bin/*.apk
